name = "rbxasset-fetch"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Dev server
[dev]
port = 8787

# KV namespace for cross-isolate caching
[[kv_namespaces]]
binding = "ASSET_CACHE"
id = "2256ce1178f645309c20388de2327aca"

[vars]
ASSET_CACHE_TTL_MS = "300000"
ALLOW_HEADER_COOKIE = "false"
